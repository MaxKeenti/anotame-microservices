services:
  identity-db:
    image: postgres:16-alpine
    container_name: identity-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: identity
    ports:
      - "5431:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d identity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: catalog-db binds to host port 5432 (PostgreSQL default). Ensure no local PostgreSQL server is running on the host.
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d catalog"]
      interval: 10s
      timeout: 5s
      retries: 5

  sales-db:
    image: postgres:16-alpine
    container_name: sales-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sales
    ports:
      - "5433:5432"
    volumes:
      - sales_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sales"]
      interval: 10s
      timeout: 5s
      retries: 5

  operations-db:
    image: postgres:16-alpine
    container_name: operations-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operations
    ports:
      - "5434:5432"
    volumes:
      - operations_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d operations"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: PgAdmin GUI for database inspection
  anotame-pgadmin:
    image: dpage/pgadmin4:8
    container_name: anotame-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@anotame.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      identity-db:
        condition: service_healthy

volumes:
  identity_db_data:
  catalog_db_data:
  sales_db_data:
  operations_db_data:
