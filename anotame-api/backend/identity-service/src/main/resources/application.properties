quarkus.application.name=identity-service
app.default-branch-id=${APP_DEFAULT_BRANCH_ID:00000000-0000-0000-0000-000000000001}
quarkus.http.port=${PORT:8081}
quarkus.http.host=0.0.0.0

# Database Configuration
quarkus.datasource.db-kind=postgresql
# Production: QUARKUS_DATASOURCE_JDBC_URL env var is set by Railway (ordinal 300, wins automatically)
# Local dev fallback: used when QUARKUS_DATASOURCE_JDBC_URL is not set
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5431/identity
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:admin}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:password}
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.idle-removal-interval=30S
quarkus.datasource.jdbc.background-validation-interval=0

# JPA / Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.log.format-sql=true
quarkus.hibernate-orm.mapping.format.global=ignore

# Cors Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,https://anotame-microservices-production.up.railway.app
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept, authorization, content-type, x-request-id, x-requested-with, x-user-name, x-user-id, x-user-role
quarkus.http.cors.exposed-headers=x-request-id
quarkus.http.cors.access-control-allow-credentials=true

# JWT Configuration
# Keys are auto-mapped from env vars by Quarkus (ordinal 300) — no explicit property needed:
#   SMALLRYE_JWT_SIGN_KEY  -> smallrye.jwt.sign.key  (private key, identity-service only)
#   MP_JWT_VERIFY_PUBLICKEY -> mp.jwt.verify.publickey (public key, all services)
# In dev mode SmallRyeJwtDevModeProcessor provides an in-memory key pair automatically.
mp.jwt.verify.issuer=anotame-identity
quarkus.smallrye-jwt.enabled=true
mp.jwt.token.header=Cookie
mp.jwt.token.cookie=jwt

# Security Paths
quarkus.http.auth.permission.public.paths=/auth/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.users.paths=/users/*
quarkus.http.auth.permission.users.policy=authenticated

# Auth Cookie Configuration
# secure=false for local dev (HTTP). %prod overrides to true for Railway (HTTPS).
anotame.auth.cookie.secure=false
%prod.anotame.auth.cookie.secure=true
anotame.auth.cookie.same-site=Lax

# Normalized HTTP access events. The shared provider logs route templates only.
quarkus.http.access-log.enabled=false
quarkus.log.handler.console.HTTP_ACCESS_JSON.format=%s%n
quarkus.log.handler.console.HTTP_ACCESS_JSON.level=INFO
quarkus.log.category."anotame.http.access".level=INFO
quarkus.log.category."anotame.http.access".handlers=HTTP_ACCESS_JSON
quarkus.log.category."anotame.http.access".use-parent-handlers=false

# JVM and datasource telemetry is served only on the separate Railway-private
# management port. Keep health on the application port for Railway healthchecks.
quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.smallrye-health.management.enabled=false
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.binder.http-server.enabled=false
quarkus.datasource.metrics.enabled=true
quarkus.log.handler.console.RUNTIME_TELEMETRY_JSON.format=%s%n
quarkus.log.handler.console.RUNTIME_TELEMETRY_JSON.level=INFO
quarkus.log.category."anotame.runtime.telemetry".level=INFO
quarkus.log.category."anotame.runtime.telemetry".handlers=RUNTIME_TELEMETRY_JSON
quarkus.log.category."anotame.runtime.telemetry".use-parent-handlers=false

# Flyway — schema migration lifecycle
quarkus.flyway.migrate-at-start=true
quarkus.flyway.connect-retries=10
quarkus.flyway.connect-retries-interval=5S
%dev.quarkus.flyway.locations=db/migration,db/dev-seed

# Hibernate — disable auto-DDL in production; dev retains update for local convenience
%prod.quarkus.hibernate-orm.database.generation=none
